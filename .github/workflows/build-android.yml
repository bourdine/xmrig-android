name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонирование репозитория с подмодулями
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. Диагностика: показать все файлы в корне
      - name: List root files
        run: ls -la

      # 3. Показать содержимое папки xmrig_custom_source (подмодуль)
      - name: List xmrig_custom_source
        run: |
          echo "=== xmrig_custom_source content ==="
          if [ -d "xmrig_custom_source" ]; then
            ls -la xmrig_custom_source/
            echo "--- Recursive listing ---"
            find xmrig_custom_source -type f -name "*.cpp" | head -20
          else
            echo "xmrig_custom_source not found!"
          fi

      # 4. Установка JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 5. Настройка Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 6. Кэширование
      - name: Cache Gradle and NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ github.workspace }}/ndk
          key: ${{ runner.os }}-gradle-ndk-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-ndk-

      # 7. Установка NDK
      - name: Install NDK
        run: |
          SDK_ROOT=$ANDROID_HOME
          NDK_VERSION="26.3.11579264"
          echo "y" | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;$NDK_VERSION"
          echo "ANDROID_NDK_HOME=$SDK_ROOT/ndk/$NDK_VERSION" >> $GITHUB_ENV

      # 8. Системные зависимости
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake make

      # 9. Подготовка нативного кода (запуск скрипта)
      - name: Prepare XMRig native code
        run: |
          if [ -f "./build-xmrig.sh" ]; then
            chmod +x ./build-xmrig.sh
            ./build-xmrig.sh
          else
            echo "build-xmrig.sh not found!"
            exit 1
          fi

      # 10. Диагностика после копирования: проверить app/src/main/cpp
      - name: Check copied files
        run: |
          echo "=== Content of app/src/main/cpp ==="
          if [ -d "app/src/main/cpp" ]; then
            ls -la app/src/main/cpp/
            echo "--- Looking for miner.cpp ---"
            find app/src/main/cpp -name "miner.cpp" || echo "miner.cpp NOT FOUND"
          else
            echo "app/src/main/cpp does not exist"
          fi

      # 11. Сборка APK
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # 12. Загрузка APK (если сборка успешна)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
